name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy files via FTP
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "u705168859.gotrips,$FTP_PASS" ftp://145.79.212.28 << 'EOF'
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 3
          mirror -R \
            --exclude-glob=.git/ \
            --exclude-glob=.github/ \
            --exclude-glob=vendor/ \
            --exclude-glob=node_modules/ \
            --exclude=.env \
            --exclude=.env.* \
            --exclude-glob=storage/logs/ \
            --exclude-glob=storage/framework/cache/ \
            --exclude-glob=storage/framework/sessions/ \
            --exclude-glob=storage/framework/testing/ \
            --exclude=database/database.sqlite \
            --exclude=public/gt-deploy-run.php \
            --exclude=deploy-*.zip \
            --exclude=gotrips-deploy.zip \
            --parallel=5 \
            . /
          bye
          EOF

      - name: Clear Laravel caches
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/gt-deploy-run.php << 'PHP'
          <?php
          if (($_GET['token'] ?? '') !== 'gt-2026-deploy') { http_response_code(404); exit; }
          define('LARAVEL_START', microtime(true));
          require __DIR__.'/../vendor/autoload.php';
          $app = require_once __DIR__.'/../bootstrap/app.php';
          $kernel = $app->make(Illuminate\Contracts\Console\Kernel::class);
          $out = [];
          foreach (['view:clear', 'config:cache', 'route:cache'] as $cmd) {
              ob_start();
              $kernel->call($cmd);
              $out[$cmd] = trim(ob_get_clean()) ?: 'ok';
          }
          echo json_encode($out, JSON_PRETTY_PRINT);
          PHP

          curl -s -u "u705168859.gotrips:${FTP_PASS}" \
            -T /tmp/gt-deploy-run.php \
            "ftp://145.79.212.28/%2Fpublic/gt-deploy-run.php"

          sleep 3

          RESULT=$(curl -s -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            "https://gotrips.ai/gt-deploy-run.php?token=gt-2026-deploy")
          echo "Artisan result: $RESULT"

          printf '<?php http_response_code(404); exit;\n' > /tmp/gt-neutralize.php
          curl -s -u "u705168859.gotrips:${FTP_PASS}" \
            -T /tmp/gt-neutralize.php \
            "ftp://145.79.212.28/%2Fpublic/gt-deploy-run.php"

          echo "Deploy complete."
